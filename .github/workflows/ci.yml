name: CI

on:
  push:
    branches: [master, "fable/**"]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  csharp:
    name: C# build + xUnit
    runs-on: windows-latest   # WPF App targets net8.0-windows → needs Windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FEASolver.sln

      - name: Build (Release)
        run: dotnet build FEASolver.sln -c Release --no-restore

      - name: Test (xUnit)
        run: dotnet test FEASolver.sln -c Release --no-build --verbosity normal

  python:
    name: Python pytest
    runs-on: windows-latest   # match the app's target platform (gmsh headless)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/FEASolver.Scripts/requirements.txt

      - name: Lint (ruff, advisory)
        continue-on-error: true   # surfaces style/lint issues without gating CI
        run: |
          python -m pip install ruff
          ruff check .

      - name: Pytest
        run: python -m pytest tests/scripts_tests -q

      # Smoke test: INP generation only (no CalculiX binary available in CI).
      - name: Verify (no-solve smoke)
        run: python src/FEASolver.Scripts/verify_solver.py --no-solve
        continue-on-error: true
